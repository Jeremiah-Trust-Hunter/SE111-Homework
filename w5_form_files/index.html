<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Your Name Here">
    <meta name="description" content="Default HTML Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
    <!--Build your Table and Form here-->

    <h1>Birthday Party Registration Form</h1>

    <table>
        <thead>
            <tr>
                <td><b>Labels</b></td>
                <td><b>Form Feilds</b></td>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>Parent/Guardian Name</td>
                <td>
                    <label for="gfirst">
                        <input type="text" required maxlength="20px" name="gfirst" id="g-first" placeholder="First Name">
                    </label>
                    <br>
                    <label for="glast">
                        <input type="text" required maxlength="20px" name="glast" id="g-last" placeholder="Last Name">
                    </label>
                </td>
            </tr>

            <tr>
                <td>Child's First Name</td>
                <td>
                    <label for="cfirst">
                        <input type="text" required name="cfirst" id="c-first" placeholder="Child's First Name">
                    </label>
                </td>
            </tr>

            <tr>
                <td>Child's Age</td>
                <td>
                    <label for="age">
                        <input type="number" required name="age" id="age" value="3">
                    </label>
                </td>
            </tr>

            <tr>
                <td>
                    <h2>Date and Time</h2>
                </td>
                <td></td>
            </tr>

            <tr>
                <td>Date</td>
                <td>
                    <label for="date">
                        <input type="date" required name="date" id="date">
                    </label>
                </td>
            </tr>

            <tr>
                <td>Start Time</td>
                <td>
                    <input type="time" required name="time" id="time">
                </td>
            </tr>

            <tr>
                <td>Number of Guests</td>
                <td>
                    <label for="guests">
                        <input type="number" name="guests" id="guests" value="5">
                    </label>
                </td>
            </tr>

            <tr>
                <td>
                    <h2>Food</h2>
                </td>
                <td></td>
            </tr>

            <tr>
                <td>Size</td>
                <td>
                    <label for="sm">
                        <input type="radio" name="size" id="sm" value="sm">sm
                    </label>

                    <label for="md">
                        <input type="radio" name="size" id="md" value="md">md
                    </label>

                    <label for="lg">
                        <input type="radio" name="size" id="lg" value="lg">lg
                    </label>
                </td>
            </tr>

            <tr>
                <td>Drinks</td>
                <td>
                    <input type="checkbox" name="drink1" id="drink1" checked value="coke">
                    <label for="drink1">Coke</label><br>

                    <input type="checkbox" name="drink2" id="drink2" value="sprite">
                    <label for="drink2">Sprite</label><br>

                    <input type="checkbox" name="drink3" id="drink3" value="fruit punch">
                    <label for="drink3">Fruit Punch</label><br>

                    <input type="checkbox" name="drink4" id="drink4" value="lemonade">
                    <label for="drink4">Lemonade</label><br>

                    <input type="checkbox" name="drink5" id="drink5" value="iced tea">
                    <label for="drink5">Iced Tea</label>
                </td>
            </tr>

            <tr>
                <td>Cake</td>
                <td>
                    <select name="cake" id="cake">
                        <option selected>Chocolate</option>
                        <option>Vanilla</option>
                        <option>I'll bring my own.</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><h2>Decorations</h2></td>
                <td></td>
            </tr>

            <tr>
                <td>Color Scheme</td>
                <td>
                    Choose a color scheme for the party<br>
                    <input type="color" name="colors" id="colors">
                </td>
            </tr>

            <tr>
                <td>Additional Comments</td>
                <td>Comments<br>
                <textarea placeholder="Please add any additional comments here." name="comments" id="comments"></textarea>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
